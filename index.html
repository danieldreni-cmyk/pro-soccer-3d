<!DOCTYPE html>
<html>
<head>
    <title>3D Soccer - Pro Edition</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: sans-serif; }
        #scoreboard { position: absolute; top: 10px; width: 100%; text-align: center; color: white; font-size: 24px; z-index: 100; font-weight: bold; }
    </style>
</head>
<body>
    <div id="scoreboard">YOU: <span id="pScore">0</span> | AI: <span id="aScore">0</span></div>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

    <script>
        // 1. Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Pitch
        const pitch = new THREE.Mesh(new THREE.PlaneGeometry(60, 100), new THREE.MeshBasicMaterial({ color: 0x2e7d32 }));
        pitch.rotation.x = -Math.PI / 2;
        scene.add(pitch);

        // 3. Ball
        const ball = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffffff }));
        ball.position.y = 0.5;
        scene.add(ball);
        let ballVel = new THREE.Vector3();

        // 4. Players
        const player = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
        player.position.set(0, 1, 20);
        scene.add(player);

        const ai = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshBasicMaterial({ color: 0x0000ff }));
        ai.position.set(0, 1, -20);
        scene.add(ai);

        camera.position.set(0, 15, 30);

        // 5. Logic
        const keys = {};
        let pScore = 0, aScore = 0;
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function animate() {
            requestAnimationFrame(animate);

            // Move Player
            if (keys['ArrowUp']) player.position.z -= 0.2;
            if (keys['ArrowDown']) player.position.z += 0.2;
            if (keys['ArrowLeft']) player.position.x -= 0.2;
            if (keys['ArrowRight']) player.position.x += 0.2;

            // AI follow ball
            if (ai.position.x < ball.position.x) ai.position.x += 0.1;
            if (ai.position.x > ball.position.x) ai.position.x -= 0.1;
            if (ai.position.z < ball.position.z) ai.position.z += 0.1;
            if (ai.position.z > ball.position.z) ai.position.z -= 0.1;

            // Physics
            [player, ai].forEach(p => {
                if (p.position.distanceTo(ball.position) < 1.2) {
                    ballVel.x = (ball.position.x - p.position.x) * 0.3;
                    ballVel.z = (ball.position.z - p.position.z) * 0.3;
                }
            });

            ball.position.add(ballVel);
            ballVel.multiplyScalar(0.96); // Friction

            // Score check
            if (ball.position.z > 50) { aScore++; reset(); }
            if (ball.position.z < -50) { pScore++; reset(); }
            document.getElementById('pScore').innerText = pScore;
            document.getElementById('aScore').innerText = aScore;

            camera.lookAt(player.position);
            renderer.render(scene, camera);
        }

        function reset() {
            ball.position.set(0, 0.5, 0);
            ballVel.set(0,0,0);
        }

        animate();
    </script>
</body>
</html>
