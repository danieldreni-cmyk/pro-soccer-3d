<!DOCTYPE html>
<html>
<head>
    <title>3D Soccer - FIFA Pro</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: Arial, sans-serif; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: white; font-size: 20px; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">⚽ Use ARROW KEYS to move the Red Player!</div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. Create the 3D World
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky Blue
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Create the Grass
        const grassGeo = new THREE.PlaneGeometry(100, 100);
        const grassMat = new THREE.MeshBasicMaterial({ color: 0x228B22 });
        const grass = new THREE.Mesh(grassGeo, grassMat);
        grass.rotation.x = -Math.PI / 2;
        scene.add(grass);

        // 3. Create the Ball
        const ballGeo = new THREE.SphereGeometry(0.5, 32, 32);
        const ballMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.position.y = 0.5;
        scene.add(ball);

        // 4. Create the Player (Red Box)
        const playerGeo = new THREE.BoxGeometry(1, 2, 1);
        const playerMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.set(0, 1, 10);
        scene.add(player);

        camera.position.set(0, 10, 20);

        // 5. Movement Logic
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function animate() {
            requestAnimationFrame(animate);

            // Move Player with Arrows
            if (keys['ArrowUp']) player.position.z -= 0.2;
            if (keys['ArrowDown']) player.position.z += 0.2;
            if (keys['ArrowLeft']) player.position.x -= 0.2;
            if (keys['ArrowRight']) player.position.x += 0.2;

            // Dribbling: Push the ball if player is close
            const distance = player.position.distanceTo(ball.position);
            if (distance < 1.5) {
                ball.position.x += (ball.position.x - player.position.x) * 0.1;
                ball.position.z += (ball.position.z - player.position.z) * 0.1;
            }

            // Camera follows player
            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 15;
            camera.lookAt(player.position);

            renderer.render(scene, camera);
        }
        animate();

        // Fix screen if window is resized
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
